name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_script: build:linux
            artifact_name: 20-20-20-reminder-linux
            cache_paths: |
              ~/.cache/electron
              ~/.cache/electron-builder
            artifact_upload_path: outputs/build/**
            release_files: outputs/build/**/*.AppImage
          - os: windows-latest
            build_script: build:win
            artifact_name: 20-20-20-reminder-windows
            cache_paths: |
              ~\AppData\Local\electron\Cache
              ~\AppData\Local\electron-builder\Cache
            artifact_upload_path: outputs/build/**
            release_files: |
              outputs/build/**/*.exe
          - os: macos-latest
            build_script: build:mac
            artifact_name: 20-20-20-reminder-macos
            cache_paths: |
              ~/Library/Caches/electron
              ~/Library/Caches/electron-builder
            artifact_upload_path: outputs/build/**
            release_files: |
              outputs/build/**/*.dmg
              outputs/build/**/*.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore Electron Build Cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cache_paths }}
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Install Dependencies
        run: npm ci

      - name: Build Desktop App
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEBUG: electron-builder
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt ${attempt}/3"
            if npm run "${{ matrix.build_script }}"; then
              exit 0
            fi

            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi

            echo "Build failed on attempt ${attempt}, retrying after 15 seconds..."
            sleep 15
          done

      - name: List Build Output
        if: always()
        shell: bash
        run: |
          echo "== outputs/build =="
          find outputs/build -maxdepth 3 -type f | sort

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_upload_path }}
          if-no-files-found: error

      - name: Attach Files To GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.release_files }}
