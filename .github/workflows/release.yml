name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_script: build:linux
            artifact_name: 20-20-20-reminder-linux
            artifact_upload_path: outputs/build/**
            release_files: outputs/build/**/*.AppImage
          - os: windows-latest
            build_script: build:win
            artifact_name: 20-20-20-reminder-windows
            artifact_upload_path: outputs/build/**
            release_files: |
              outputs/build/**/*.exe
          - os: macos-latest
            build_script: build:mac
            artifact_name: 20-20-20-reminder-macos
            artifact_upload_path: outputs/build/**
            release_files: |
              outputs/build/**/*.dmg
              outputs/build/**/*.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Desktop App
        run: npm run ${{ matrix.build_script }}

      - name: List Build Output
        run: |
          echo "== outputs/build =="
          find outputs/build -maxdepth 3 -type f | sort

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_upload_path }}
          if-no-files-found: error

      - name: Attach Files To GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.release_files }}
